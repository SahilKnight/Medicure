{% extends "base.html" %}
{% block title %}Login — PharmaLane{% endblock %}

{% block extra_css %}
<style>
  .auth-wrapper {
    min-height: calc(100vh - 70px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
    background: radial-gradient(ellipse at 50% 30%, rgba(0,201,167,0.06) 0%, transparent 60%);
  }
  .auth-card {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  }
  .auth-logo { text-align: center; margin-bottom: 2rem; }
  .auth-logo h2 { font-weight: 700; font-size: 1.6rem; }
  .auth-logo h2 span { color: var(--primary); }
  .auth-logo p { color: var(--text-muted); font-size: 0.88rem; margin-top: 0.3rem; }
  .form-label { font-size: 0.85rem; font-weight: 500; color: #c9d1d9; margin-bottom: 0.4rem; }
  .form-control {
    background: var(--bg-card2);
    border: 1px solid var(--border);
    color: #e6edf3;
    border-radius: 8px;
    padding: 0.65rem 1rem;
    font-size: 0.9rem;
    transition: border-color 0.2s;
  }
  .form-control:focus { background: var(--bg-card2); border-color: var(--primary); color: #e6edf3; box-shadow: 0 0 0 3px rgba(0,201,167,0.1); }
  .form-control::placeholder { color: #484f58; }
  .input-group-text { background: var(--bg-card2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 8px 0 0 8px; }
  .btn-submit { width: 100%; padding: 0.7rem; font-weight: 600; font-size: 0.95rem; border-radius: 8px; background: var(--primary); border: none; color: #000; transition: all 0.2s; }
  .btn-submit:hover { background: var(--primary-dark); transform: translateY(-1px); }
  .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.85rem; color: var(--text-muted); }
  .auth-footer a { color: var(--primary); text-decoration: none; font-weight: 500; }
  .divider { display: flex; align-items: center; gap: 1rem; margin: 1.5rem 0; color: var(--text-muted); font-size: 0.8rem; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrapper">
  <div class="auth-card">
    <div class="auth-logo">
      <h2>Pharma<span>Lane</span></h2>
      <p data-i18n="login.title">Sign in to your account</p>
    </div>
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3">
        <label class="form-label" data-i18n="login.email">Email Address</label>
        <input type="email" name="email" class="form-control" placeholder="you@example.com" required autofocus />
      </div>
      <div class="mb-4">
        <label class="form-label" data-i18n="login.password">Password</label>
        <input type="password" name="password" class="form-control" placeholder="••••••••" required />
      </div>
      <button type="submit" class="btn btn-submit"><i class="fa fa-sign-in-alt me-2"></i><span data-i18n="login.btn">Sign In</span></button>
    </form>
    <div class="auth-footer">
      <span data-i18n="login.no_account">Don't have an account?</span> <a href="{{ url_for('register') }}" data-i18n="login.create">Create one free</a>
    </div>
  </div>
</div>
{% endblock %}
