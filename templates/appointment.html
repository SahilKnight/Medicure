<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Book an Appointment - PharmaLane</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-4bw+/aepP/YC94hEpVNVgiZdgIC5+VKNBQNGCHeKRQN+PtmoHDEXuppvnDJzQIu9" crossorigin="anonymous">

    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Times New Roman', Times, serif;
            font-size: 16px;
        }

        .section-title {
            font-size: 24px;
            margin-top: 20px;
            font-weight: bold;
            color: #f8f9fa;
            text-align: center;
            border-style: solid;
            border-width: 5px;
            border-color: rgba(201, 76, 76, 0.3);
        }

        .content-box {
            background-color: #222;
            border-radius: 10px;
            padding: 20px;
            margin-top: 20px;
            border-color: rgba(201, 76, 76, 0.3);
            font-size: large;
        }

        .form-control, .btn {
            border-radius: 5px;
            border-color: rgba(201, 76, 76, 0.3);
        }

        .form-label {
            font-weight: bold;
        }

        .btn-primary {
            background-color: #ff5c5c;
            border: none;
        }

        .btn-primary:hover {
            background-color: #ff2c2c;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">PharmaLane</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/about">About</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/contact">Contact</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/appointments">Appointments</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Booking Form Section -->
    <div class="container my-5">
        <h2 class="section-title">Book an Appointment</h2>
        <div class="content-box">
            <form action="/submit-appointment" method="post">
                <div class="mb-3">
                    <label for="doctorSelect" class="form-label">Select Doctor:</label>
                    <select class="form-select" id="doctorSelect" name="doctor">
                        <option value="Dr. John Doe">Dr. John Doe - Cardiologist</option>
                        <option value="Dr. Jane Smith">Dr. Jane Smith - Neurologist</option>
                        <option value="Dr. Alice Brown">Dr. Alice Brown - General Practitioner</option>
                        <option value="Dr. Michael White">Dr. Michael White - Pediatrician</option>
                    </select>
                </div>
                <div class="mb-3">
                    <label for="appointmentDate" class="form-label">Select Date:</label>
                    <input type="date" class="form-control" id="appointmentDate" name="date" required>
                </div>
                <div class="mb-3">
                    <label for="appointmentTime" class="form-label">Select Time:</label>
                    <input type="time" class="form-control" id="appointmentTime" name="time" required>
                </div>
                <div class="mb-3">
                    <label for="patientName" class="form-label">Your Name:</label>
                    <input type="text" class="form-control" id="patientName" name="name" placeholder="Enter your full name" required>
                </div>
                <div class="mb-3">
                    <label for="contactInfo" class="form-label">Contact Information:</label>
                    <input type="tel" class="form-control" id="contactInfo" name="contact" placeholder="Enter your phone number" required>
                </div>
                <button type="submit" class="btn btn-primary">Book Appointment</button>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.1/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-HwwvtgBNo3bZJJLYd8oVXjrBZt8cqVSpeBNS5n7C8IVInixGAoxmnlMuBnhbgrkm"
        crossorigin="anonymous"></script>
</body>

</html>
